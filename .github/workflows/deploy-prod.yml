name: Deploy to Prod

# ESQUELETO — não-funcional até infra prod existir.
# Bloqueado por workflow_dispatch + tag check pra evitar disparo acidental.
# Quando criar services Cloud Run *-prod (auditoria-api-prod, auditoria-web-prod,
# auditoria-api-migrate-prod), e configurar a variable API_URL_PROD no
# environment 'production' do GitHub, é só remover o `if: false` abaixo.
#
# Diferenças vs deploy-dev.yml:
#   - Trigger: tag `v*.*.*` (semver) ou workflow_dispatch.
#   - Environment 'production' tem required reviewer (você).
#   - Services: *-prod ao invés de *-dev.
#   - Secret name pattern: *-prod (db-url, jwt-secret, etc).
#
# Pra ativar de fato no futuro:
#   1. Criar services Cloud Run prod (mesmo pattern que dev).
#   2. Setar vars.API_URL_PROD em Settings → Environments → production → Variables.
#   3. Rodar `bash scripts/setup-gcp.sh prod` (provisiona a KEK do KMS -prod e
#      os secrets de alerta -prod, isolados dos de dev) ANTES do primeiro deploy
#      — senão o wrap/unwrap 500a e o alerting não sobe. Adicionar o VALOR real
#      do canal de plantão de PROD (pelo menos um: webhook ou e-mail).
#   4. Remover `if: false` dos jobs; injetar KEK_KMS_KEY_NAME + montar
#      ALERT_WEBHOOK_URL/ALERT_EMAIL_TO (secrets abaixo) no serviço da API E nos
#      jobs (migração/cleanup), paridade — igual ao deploy-dev.yml.
#   5. Espelhar o job `smoke-alert` (roda scripts/smoke_alert_delivery.py: loga
#      como admin de monitoração e dispara POST /api/v1/system/alert-test — gatilho
#      sintético da 03.6 — provando a ENTREGA; gate do pipeline) e o
#      `Register runtime invariant`. Bootstrap manual em production:
#      criar o admin de monitoração + secrets SMOKE_ADMIN_EMAIL/SMOKE_ADMIN_PASSWORD
#      e a Variable API_URL_PROD no Environment 'production' (ver setup-gcp.sh prod).

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        type: choice
        default: all
        options:
          - all
          - api
          - web
      run_migrations:
        description: 'Run migrations'
        required: true
        type: boolean
        default: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  REGION: southamerica-east1
  PROJECT_ID: liberdade-assessoria
  AR_HOST: southamerica-east1-docker.pkg.dev
  AR_REPO: auditoria
  API_SERVICE: auditoria-api-prod
  WEB_SERVICE: auditoria-web-prod
  MIGRATE_JOB: auditoria-api-migrate-prod
  CLEANUP_JOB: auditoria-api-cleanup-stuck-prod
  # KEK do KMS -prod (isolada da de dev). Provisionada por scripts/setup-gcp.sh prod.
  KEK_KMS_KEY_NAME: projects/liberdade-assessoria/locations/southamerica-east1/keyRings/auditoria-prod/cryptoKeys/omie-encryption-kek
  # Alerting -prod (isolado do de dev). Secrets provisionados por setup-gcp.sh prod;
  # o operador adiciona o VALOR do canal de plantão de PROD. Fail-closed no boot.
  ALERT_WEBHOOK_SECRET: alert-webhook-url-prod
  ALERT_EMAIL_SECRET: alert-email-to-prod
  # Ao ativar: setar API_BASE_URL: ${{ vars.API_URL_PROD }} no env do JOB
  # `smoke-alert` (variable de ENVIRONMENT só resolve dentro de um job que
  # declara `environment: production`; no topo do workflow não resolveria).
  # O smoke dispara o gatilho sintético da 03.6 (POST /api/v1/system/alert-test).

jobs:
  guard:
    name: Block until prod infra exists
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "::error::Prod infra ainda não foi criada."
          echo "Ver comentários no topo de deploy-prod.yml pra ativar."
          exit 1

  # Quando ativar de verdade, copia a estrutura do deploy-dev.yml com:
  #   - service_account: ${{ secrets.GCP_API_SERVICE_ACCOUNT }} (mesmo SA — RBAC
  #     do SA é controlado por bindings de secret, não por nome)
  #   - --substitutions=_TAG=$GITHUB_REF_NAME (ex: v1.2.3)
  #   - imagens prod com tag semver: auditoria-api:v1.2.3 (E também atualizar :latest)
  #   - env environment: production  → exige reviewer
  #   - sem serviço worker: o processamento async roda como BackgroundTasks no
  #     próprio serviço da API (FASE 0, sem Redis/ARQ). Garantir no
  #     auditoria-api-prod: --no-cpu-throttling + --min-instances=1.
  #   - re-resolve digest do cleanup Job prod (espelho do dev) dentro do
  #     migrate, igual fazemos pro CLEANUP_JOB em dev.
