name: Deploy to Dev

# Estratégia:
#   push em main           → roda só nos services cujo path mudou (paths-filter).
#   workflow_dispatch      → escolhe target (all/api/web) e se roda migrations.
#
# Ordem dentro do workflow (quando ambos rodam):
#   build-api → migrate → deploy-api     e em paralelo:    build-web → deploy-web
#                                                               ↑
#                                           deploy-web aguarda deploy-api (success OU skipped)
#                                           pra evitar Web fresco apontando pra API velha.
#
# FASE 0: não há mais serviço `worker` — o processamento async roda como
# BackgroundTasks no próprio serviço da API (sem Redis/ARQ).
#
# Concurrency: cancel-in-progress=false. Deploy nunca se cancela no meio —
# evita schema half-applied ou revisão zumbi.

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'docker/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/deploy-dev.yml'

  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        type: choice
        default: all
        options:
          - all
          - api
          - web
      run_migrations:
        description: 'Run migrations (only when target includes api)'
        required: true
        type: boolean
        default: true

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # WIF

env:
  REGION: southamerica-east1
  PROJECT_ID: liberdade-assessoria
  AR_HOST: southamerica-east1-docker.pkg.dev
  AR_REPO: auditoria
  API_SERVICE: auditoria-api-dev
  WEB_SERVICE: auditoria-web-dev
  MIGRATE_JOB: auditoria-api-migrate-dev
  CLEANUP_JOB: auditoria-api-cleanup-stuck-dev
  # Nome canônico do recurso da KEK (Cloud KMS) — provisionado 1× por ambiente
  # via scripts/setup-gcp.sh dev. NÃO é segredo (é um resource path), então vai
  # como env var comum. O backend usa este nome pra wrap/unwrap das DEKs por
  # cliente (Sprint 3, Req. 1). Precisa estar no serviço da API E no job de
  # migração (o backfill roda no job) — paridade garantida abaixo.
  KEK_KMS_KEY_NAME: projects/liberdade-assessoria/locations/southamerica-east1/keyRings/auditoria-dev/cryptoKeys/omie-encryption-kek
  # Alerting (Sprint 3, Req. 4 / INFRA 03.7) — secrets do canal COMPARTILHADO de
  # plantão. Provisionados por scripts/setup-gcp.sh dev; o VALOR real é adicionado
  # pelo operador (não versionado). Montados como ALERT_WEBHOOK_URL/ALERT_EMAIL_TO
  # no serviço da API E nos jobs (paridade). Fail-closed no boot se ambos vazios.
  ALERT_WEBHOOK_SECRET: alert-webhook-url-dev
  ALERT_EMAIL_SECRET: alert-email-to-dev
  # NB: a base da API (vars.API_URL_DEV) é uma variable de ENVIRONMENT — só
  # resolve dentro de um job que declara `environment:`. Por isso ela é setada no
  # env do job `smoke-alert` (abaixo), não aqui no topo (onde não resolveria).

jobs:
  # ------------------------------------------------------------------
  # Path filter — decide quais frentes (api/web) rodam em push events
  # ------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'docker/Dockerfile.api'
              - 'docker/cloudbuild/cloudbuild-api.yaml'
            web:
              - 'apps/web/**'
              - 'packages/shared-types/**'
              - 'docker/Dockerfile.web'
              - 'docker/cloudbuild/cloudbuild-web.yaml'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'

  # ------------------------------------------------------------------
  # API — build → migrate → deploy
  # ------------------------------------------------------------------
  build-api:
    name: Build API image
    needs: changes
    if: |
      (github.event_name == 'push' && needs.changes.outputs.api == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'api'))
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_API_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Cloud Build API
        run: |
          gcloud builds submit \
            --config=docker/cloudbuild/cloudbuild-api.yaml \
            --substitutions=_TAG=dev \
            --project=${{ env.PROJECT_ID }} \
            .

  migrate:
    name: Run DB migrations
    needs: build-api
    if: |
      needs.build-api.result == 'success' &&
      (github.event_name == 'push' || inputs.run_migrations == true)
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Auth GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_API_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Re-resolve :dev digest in migrate Job
        # Job guarda o digest no manifest; sem update, próxima execução
        # roda imagem velha. Esse update força re-resolução.
        #
        # KEK_KMS_KEY_NAME vai TAMBÉM aqui (paridade com o serviço da API): o
        # backfill de cripto (Sprint 3, Req. 2/03.4) roda neste job e precisa do
        # unwrap das DEKs — sem a var, o job falha no boot. `--update-env-vars`
        # faz merge (não zera as outras vars do job).
        run: |
          gcloud run jobs update ${{ env.MIGRATE_JOB }} \
            --image=${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/auditoria-api:dev \
            --update-env-vars=KEK_KMS_KEY_NAME=${{ env.KEK_KMS_KEY_NAME }} \
            --update-secrets=ALERT_WEBHOOK_URL=${{ env.ALERT_WEBHOOK_SECRET }}:latest,ALERT_EMAIL_TO=${{ env.ALERT_EMAIL_SECRET }}:latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Re-resolve :dev digest in cleanup Job
        # Mesmo problema do migrate Job: o cleanup roda via Cloud Scheduler
        # de hora em hora e guarda o digest no manifest. Sem update, o cron
        # roda imagem velha pra sempre depois que :dev avança.
        run: |
          gcloud run jobs update ${{ env.CLEANUP_JOB }} \
            --image=${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/auditoria-api:dev \
            --update-env-vars=KEK_KMS_KEY_NAME=${{ env.KEK_KMS_KEY_NAME }} \
            --update-secrets=ALERT_WEBHOOK_URL=${{ env.ALERT_WEBHOOK_SECRET }}:latest,ALERT_EMAIL_TO=${{ env.ALERT_EMAIL_SECRET }}:latest \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Execute alembic upgrade head
        run: |
          gcloud run jobs execute ${{ env.MIGRATE_JOB }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --wait

  deploy-api:
    name: Deploy API revision
    needs: migrate
    if: needs.migrate.result == 'success'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Auth GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_API_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        # DEPLOYED_AT serve 2 propósitos:
        #   1. Força criação de revisão nova (gcloud sem mudanças = no-op).
        #   2. Audit trail visível na console.
        #
        # ⚠️ FASE 0 (BackgroundTasks): o processamento async agora roda NESTE
        # serviço, fora do handler HTTP. O Cloud Run estrangula CPU fora de
        # requests e pode reciclar a instância (scale-to-zero) — a task
        # congelaria/morreria. PRÉ-REQUISITO no serviço da API (setado
        # manualmente, pendente de aprovação de custo — ver
        # Docs/PLANO_PROXIMOS_PASSOS.md, decisões em aberto):
        #   --no-cpu-throttling  (CPU always-on)
        #   --min-instances=1    (não reciclar no meio do job)
        # `services update --image/--update-env-vars` PRESERVA essas annotations;
        # só se perdem se o serviço for recriado do zero. Rede de segurança:
        # cron `auditoria-api-cleanup-stuck-dev` (25min).
        run: |
          gcloud run services update ${{ env.API_SERVICE }} \
            --image=${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/auditoria-api:dev \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --update-env-vars=DEPLOYED_AT=$(date -u +%Y%m%dT%H%M%SZ),KEK_KMS_KEY_NAME=${{ env.KEK_KMS_KEY_NAME }} \
            --update-secrets=ALERT_WEBHOOK_URL=${{ env.ALERT_WEBHOOK_SECRET }}:latest,ALERT_EMAIL_TO=${{ env.ALERT_EMAIL_SECRET }}:latest \
            --quiet

  # ------------------------------------------------------------------
  # Smoke — prova de ENTREGA do alerta (Sprint 3, Req. 4 / INFRA 03.7)
  # ------------------------------------------------------------------
  # "Alerta configurado" NÃO conta sem entrega provada. Este job dispara o gatilho
  # SINTÉTICO da 03.6 (POST /api/v1/system/alert-test, admin-only) contra o
  # serviço da API JÁ deployado e configurado — o backend chama send_alert(SYNTHETIC)
  # ao(s) canal(is) real(is). Se a notificação não chegar (delivered=false) o
  # pipeline é REPROVADO.
  #
  # Por que o endpoint e não um Cloud Run Job: a 03.6 entregou o gatilho como
  # endpoint HTTP (não como módulo runnable), e um Job novo não sobe o app sem o
  # conjunto completo de secrets (DATABASE_URL + chaves de cripto) que só o
  # serviço tem. Bater no serviço vivo exercita o caminho REAL de dispatch.
  #
  # Fail-closed é garantido ANTES daqui, no boot do serviço: verify_alert_config
  # no lifespan RECUSA subir sem canal entregável → deploy-api falha → o smoke
  # nem chega a rodar (needs: deploy-api). Aqui provamos a ENTREGA de verdade.
  smoke-alert:
    name: Smoke — synthetic alert delivery
    needs: deploy-api
    if: needs.deploy-api.result == 'success'
    runs-on: ubuntu-latest
    environment: development
    env:
      # Environment variable → só resolve aqui dentro (job com `environment:`).
      API_BASE_URL: ${{ vars.API_URL_DEV }}
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_API_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Trigger synthetic alert via 03.6 endpoint and assert delivery
        # scripts/smoke_alert_delivery.py (stdlib puro): login como admin de
        # monitoração → POST /api/v1/system/alert-test → assert data.delivered.
        # Sai != 0 se a notificação não chegou. Nunca imprime senha/cookie/PII.
        env:
          SMOKE_ADMIN_EMAIL: ${{ secrets.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ secrets.SMOKE_ADMIN_PASSWORD }}
        run: |
          if [ -z "${API_BASE_URL}" ]; then
            echo "::error::vars.API_URL_DEV não definida no environment 'development'."
            exit 1
          fi
          python3 scripts/smoke_alert_delivery.py

      - name: Register runtime invariant (heartbeat depende disto)
        if: always()
        # O watchdog/heartbeat do processamento assíncrono só funciona com CPU
        # always-on e sem scale-to-zero. Estes flags são setados MANUALMENTE no
        # serviço (custo pendente de aprovação — ver CLAUDE.md §10). Aqui só
        # CONFIRMAMOS/REGISTRAMOS (read-only) e AVISAMOS se regrediram — não
        # falhamos o deploy nem alteramos custo unilateralmente.
        run: |
          echo "=== Invariante de runtime da API (${API_SERVICE}) ==="
          MIN_INST=$(gcloud run services describe "${API_SERVICE}" \
            --region="${REGION}" --project="${PROJECT_ID}" \
            --format="value(spec.template.metadata.annotations['autoscaling.knative.dev/minScale'])" 2>/dev/null || echo "")
          THROTTLE=$(gcloud run services describe "${API_SERVICE}" \
            --region="${REGION}" --project="${PROJECT_ID}" \
            --format="value(spec.template.metadata.annotations['run.googleapis.com/cpu-throttling'])" 2>/dev/null || echo "")
          echo "min-instances (minScale) = '${MIN_INST:-<vazio>}'  (requer >= 1)"
          echo "cpu-throttling           = '${THROTTLE:-<vazio>}'  (requer 'false' = no-cpu-throttling)"
          if [ -z "${MIN_INST}" ] || [ "${MIN_INST}" = "0" ]; then
            echo "::warning::min-instances < 1 — heartbeat do async pode congelar (ver CLAUDE.md §10)."
          fi
          if [ "${THROTTLE}" != "false" ]; then
            echo "::warning::cpu-throttling não está 'false' — CPU estrangulada fora de requests quebra o heartbeat."
          fi

  # ------------------------------------------------------------------
  # Web — build → deploy (espera deploy-api se ele rodar)
  # ------------------------------------------------------------------
  build-web:
    name: Build Web image
    needs: changes
    if: |
      (github.event_name == 'push' && needs.changes.outputs.web == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'web'))
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_WEB_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Validate API_URL_DEV env variable
        # INTERNAL_API_URL é build-arg do Next (rewrites são resolvidos
        # em build-time pelo Next 14, não runtime).
        run: |
          if [ -z "${{ vars.API_URL_DEV }}" ]; then
            echo "::error::vars.API_URL_DEV não está definida no environment 'development'."
            echo "Configure em Settings → Environments → development → Variables."
            exit 1
          fi
          echo "Using INTERNAL_API_URL=${{ vars.API_URL_DEV }}"

      - name: Cloud Build Web
        run: |
          gcloud builds submit \
            --config=docker/cloudbuild/cloudbuild-web.yaml \
            --substitutions=_TAG=dev,_API_URL=${{ vars.API_URL_DEV }} \
            --project=${{ env.PROJECT_ID }} \
            .

  deploy-web:
    name: Deploy Web revision
    needs: [build-web, deploy-api]
    if: |
      always() &&
      needs.build-web.result == 'success' &&
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped')
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Auth GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_WEB_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        # INTERNAL_API_URL não vai aqui — é build-arg (Dockerfile.web),
        # injetado no build-web. DEPLOYED_AT força revisão nova mesmo se
        # nenhum outro campo mudou.
        run: |
          gcloud run services update ${{ env.WEB_SERVICE }} \
            --image=${{ env.AR_HOST }}/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/auditoria-web:dev \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --update-env-vars=DEPLOYED_AT=$(date -u +%Y%m%dT%H%M%SZ) \
            --quiet

  # ------------------------------------------------------------------
  # Summary — sempre roda, agrega status de tudo (útil pra ver de relance)
  # ------------------------------------------------------------------
  summary:
    name: Deploy summary
    needs: [changes, build-api, migrate, deploy-api, smoke-alert, build-web, deploy-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print results
        run: |
          echo "=== Deploy to Dev — resultados ==="
          echo "changes:       ${{ needs.changes.result }}"
          echo "build-api:     ${{ needs.build-api.result }}"
          echo "migrate:       ${{ needs.migrate.result }}"
          echo "deploy-api:    ${{ needs.deploy-api.result }}"
          echo "smoke-alert:   ${{ needs.smoke-alert.result }}"
          echo "build-web:     ${{ needs.build-web.result }}"
          echo "deploy-web:    ${{ needs.deploy-web.result }}"
          # Falha o summary se qualquer job não-skipped deu failure
          # (skipped por path-filter é OK; cancelled/failure não é).
          # smoke-alert entra como GATE: se a entrega do alerta falhar, o
          # pipeline é reprovado (Req. 4 — "alerta configurado" não basta).
          for r in \
            "${{ needs.build-api.result }}" \
            "${{ needs.migrate.result }}" \
            "${{ needs.deploy-api.result }}" \
            "${{ needs.smoke-alert.result }}" \
            "${{ needs.build-web.result }}" \
            "${{ needs.deploy-web.result }}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::Algum job falhou — ver acima"
              exit 1
            fi
          done
